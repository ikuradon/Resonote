name: Feature Request
description: 新機能の提案
labels: [feature]
body:
  - type: textarea
    id: description
    attributes:
      label: 概要
      description: どんな機能が欲しいかを説明してください
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要か、どんな問題を解決するか
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのように実現するか、アイデアがあれば
  - type: textarea
    id: ownership
    attributes:
      label: 想定配置 / ownership
      description: 実装するなら `shared` / `features` / `app` / `web` / `lib` のどこに置くべきか
  - type: textarea
    id: performance
    attributes:
      label: 性能・bundle 影響
      description: 初期表示、lazy load、bundle size への影響見込みがあれば書いてください
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 検討した別のアプローチがあれば
  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: 参考リンク、モックアップなど
