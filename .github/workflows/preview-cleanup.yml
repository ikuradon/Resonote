name: Preview Cleanup

on:
  pull_request_target:
    types: [closed]
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Delete Preview Deployment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      deployments: write
    steps:
      - name: Delete Cloudflare preview deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BRANCH="pr-${PR_NUMBER}"
          DEPLOY_IDS=$(npx wrangler@4 pages deployment list --project-name=resonote-preview \
            --json 2>/dev/null | jq -r --arg branch "$BRANCH" \
            '[.[] | select(.deployment_trigger.metadata.branch == $branch) | .id] | .[]' 2>/dev/null || true)
          for DEPLOY_ID in $DEPLOY_IDS; do
            npx wrangler@4 pages deployment delete "$DEPLOY_ID" --project-name=resonote-preview --yes || true
          done

      - name: Deactivate GitHub environment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          ENV_NAME="preview-pr-${PR_NUMBER}"
          DEPLOY_IDS=$(gh api "repos/$REPO/deployments?environment=$ENV_NAME&per_page=100" \
            --jq '.[].id' 2>/dev/null || true)
          for DID in $DEPLOY_IDS; do
            gh api "repos/$REPO/deployments/$DID/statuses" \
              -X POST -f state=inactive --silent 2>/dev/null || true
          done

      - name: Update preview comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          COMMENT_ID=$(gh api "repos/$REPO/issues/${PR_NUMBER}/comments?per_page=100" \
            --jq '[.[] | select((.user.login | startswith("github-actions")) and (.body | contains("<!-- preview-deploy -->"))) | .id] | last // ""')
          if [[ -n "$COMMENT_ID" ]]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" -X PATCH \
              -f body="<!-- preview-deploy -->
          ## Preview Deploy

          Preview deployment has been cleaned up." --silent
          fi
