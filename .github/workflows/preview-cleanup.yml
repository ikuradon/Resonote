name: Preview Cleanup

on:
  pull_request_target:
    types: [closed]
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Delete Preview Deployment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find preview branch name
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH=$(gh pr view "$PR_NUMBER" --json comments --repo "$REPO" \
            --jq '[.comments[] | select(.body | contains("<!-- preview-deploy -->")) | .body | capture("Branch: `(?<id>[a-z-]+)`") | .id] | last // ""')
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Delete preview deployment
        if: steps.preview.outputs.branch != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH: ${{ steps.preview.outputs.branch }}
        run: |
          DEPLOY_ID=$(npx wrangler@4 pages deployment list --project-name=resonote \
            --json | jq -r --arg branch "$BRANCH" \
            '[.[] | select(.deployment_trigger.metadata.branch == $branch)] | last | .id // ""')
          if [[ -n "$DEPLOY_ID" ]]; then
            npx wrangler@4 pages deployment delete "$DEPLOY_ID" --project-name=resonote --yes
          fi

      - name: Update preview comment
        if: steps.preview.outputs.branch != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          COMMENT_ID=$(gh pr view "$PR_NUMBER" --json comments --repo "$REPO" \
            --jq '[.comments[] | select(.body | contains("<!-- preview-deploy -->")) | .id] | last // ""')
          if [[ -n "$COMMENT_ID" ]]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" -X PATCH \
              -f body="<!-- preview-deploy -->
          ## Preview Deploy

          Preview deployment has been cleaned up." --silent
          fi
