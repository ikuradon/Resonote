name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2

      - name: Bump version
        id: bump
        run: |
          # Bump version without creating git tag
          pnpm version ${{ github.event.inputs.version_type }} --no-git-tag-version

          # Get new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "branch_name=release/v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: |
          git checkout -b ${{ steps.bump.outputs.branch_name }}
          git add package.json pnpm-lock.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin ${{ steps.bump.outputs.branch_name }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.bump.outputs.branch_name }}
          title: 'chore: bump version to ${{ steps.bump.outputs.new_version }}'
          body: |
            ## Version Bump

            - **Version:** ${{ steps.bump.outputs.new_version }}
            - **Type:** ${{ github.event.inputs.version_type }}

            ### Changes
            - Updated `package.json` version
            - Updated `pnpm-lock.yaml`

            ### After Merge
            This PR will automatically create:
            - Git tag `v${{ steps.bump.outputs.new_version }}`
            - GitHub Release with generated notes
          base: main
          delete-branch: true
