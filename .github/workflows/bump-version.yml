name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2

      - name: Bump version
        id: bump
        run: |
          # Bump version without creating git tag
          pnpm version ${{ github.event.inputs.version_type }} --no-git-tag-version

          # Get new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "branch_name=release/v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch and PR
        env:
          BRANCH_NAME: ${{ steps.bump.outputs.branch_name }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -b "$BRANCH_NAME"
          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin "$BRANCH_NAME"

          # Create PR using GitHub CLI
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "chore: bump version to $NEW_VERSION" \
            --body "## Version Bump

          - **Version:** $NEW_VERSION
          - **Type:** $VERSION_TYPE

          ### Changes
          - Updated \`package.json\` version

          ### After Merge
          This PR will automatically create:
          - Git tag \`v$NEW_VERSION\`
          - GitHub Release with generated notes"
