name: Preview Deploy

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  remove-label-on-update:
    name: Remove ok-to-test on update
    if: |
      github.event.action == 'synchronize' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove ok-to-test label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "ok-to-test" --repo "$REPO" 2>/dev/null || true

  deploy-preview:
    name: Deploy Preview
    if: |
      (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test') &&
      (
        github.event.pull_request.head.repo.full_name == github.repository ||
        contains(github.event.pull_request.labels.*.name, 'ok-to-test')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate preview ID
        id: preview-id
        run: |
          WORDS=(amber breeze cedar drift ember frost glow haze iris jade knoll lark mist nova oak pine quartz ridge stone tide umber vale wind yarn zen)
          PREVIEW_ID=$(shuf -e "${WORDS[@]}" -n 5 | paste -sd '-')
          echo "id=$PREVIEW_ID" >> "$GITHUB_OUTPUT"

      - name: Restore existing preview ID
        id: existing-id
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh pr view "$PR_NUMBER" --json comments --repo "$REPO" \
            --jq '[.comments[] | select(.body | contains("<!-- preview-deploy -->")) | .body | capture("Branch: `(?<id>[a-z-]+)`") | .id] | last // ""')
          if [[ -n "$EXISTING" ]]; then
            echo "id=$EXISTING" >> "$GITHUB_OUTPUT"
          fi

      - name: Set preview branch
        id: branch
        env:
          NEW_ID: ${{ steps.preview-id.outputs.id }}
          EXISTING_ID: ${{ steps.existing-id.outputs.id }}
        run: |
          BRANCH="${EXISTING_ID:-$NEW_ID}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=resonote --branch=${{ steps.branch.outputs.name }}
          packageManager: pnpm
        env:
          SYSTEM_NOSTR_PRIVKEY: ${{ secrets.PREVIEW_NOSTR_PRIVKEY }}

      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ steps.branch.outputs.name }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PREVIEW_URL="https://${BRANCH}.resonote.pages.dev"
          SHORT_SHA="${COMMIT_SHA::7}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          BODY="<!-- preview-deploy -->
          ## Preview Deploy

          | | |
          |---|---|
          | **URL** | ${PREVIEW_URL} |
          | **Branch** | \`${BRANCH}\` |
          | **Commit** | \`${SHORT_SHA}\` |
          | **Updated** | ${TIMESTAMP} |"

          # Update existing comment or create new one
          COMMENT_ID=$(gh pr view "$PR_NUMBER" --json comments --repo "$REPO" \
            --jq '[.comments[] | select(.body | contains("<!-- preview-deploy -->")) | .id] | last // ""')

          if [[ -n "$COMMENT_ID" ]]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" -X PATCH -f body="$BODY" --silent
          else
            gh pr comment "$PR_NUMBER" --body "$BODY" --repo "$REPO"
          fi
