name: Preview Deploy

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  remove-label-on-update:
    name: Remove ok-to-test on update
    if: |
      github.event.action == 'synchronize' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove ok-to-test label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "ok-to-test" --repo "$REPO" 2>/dev/null || true

  build:
    name: Build Preview
    if: |
      (github.event.action != 'labeled' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event.action == 'labeled' && github.event.label.name == 'ok-to-test' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: preview-build-${{ github.event.pull_request.number }}
          path: .svelte-kit/
          include-hidden-files: true
          retention-days: 1

  deploy-preview:
    name: Deploy Preview
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      deployments: write
      actions: read
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: https://pr-${{ github.event.pull_request.number }}.resonote-preview.pages.dev
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: preview-build-${{ github.event.pull_request.number }}
          path: .svelte-kit/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --no-bundle --project-name=resonote-preview --branch=pr-${{ github.event.pull_request.number }}
          wranglerVersion: '4'

      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PREVIEW_URL="https://pr-${PR_NUMBER}.resonote-preview.pages.dev"
          SHORT_SHA="${COMMIT_SHA::7}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          BODY="<!-- preview-deploy -->
          ## Preview Deploy

          | | |
          |---|---|
          | **URL** | ${PREVIEW_URL} |
          | **Commit** | \`${SHORT_SHA}\` |
          | **Updated** | ${TIMESTAMP} |"

          # Update existing comment or create new one
          COMMENT_ID=$(gh api "repos/$REPO/issues/${PR_NUMBER}/comments" --paginate \
            --jq '[.[] | select((.user.login | startswith("github-actions")) and (.body | contains("<!-- preview-deploy -->"))) | .id] | last // ""')

          if [[ -n "$COMMENT_ID" ]]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" -X PATCH -f body="$BODY" --silent
          else
            gh pr comment "$PR_NUMBER" --body "$BODY" --repo "$REPO"
          fi
