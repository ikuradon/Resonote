<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #06060a;
        color: #c9a256;
        font-family: sans-serif;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="loading" class="loading">Navigate to a supported site to start</div>
    <iframe
      id="resonote-frame"
      style="display: none"
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
    ></iframe>
    <script type="module" src="bridge.js"></script>
  </body>
</html>
