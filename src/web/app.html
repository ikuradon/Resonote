<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      const observer = new MutationObserver(() => {
        const el = document.getElementById('loading-indicator');
        if (el) {
          el.style.opacity = '0';
          setTimeout(() => el.remove(), 300);
        }
        observer.disconnect();
      });
      const target = document.querySelector('[style="display: contents"]');
      if (target) observer.observe(target, { childList: true });
    </script>
    <div
      id="loading-indicator"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        min-height: 100vh;
        background: #06060a;
        color: #c9a256;
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        letter-spacing: 0.05em;
        transition: opacity 0.3s ease;
      "
    >
      <span style="font-weight: 600">Resonote</span>
      <span
        style="
          display: block;
          width: 24px;
          height: 2px;
          background: #c9a256;
          animation: pulse 1.5s ease-in-out infinite;
        "
      ></span>
    </div>
    <style>
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scaleX(1);
        }
        50% {
          opacity: 1;
          transform: scaleX(2);
        }
      }
    </style>
  </body>
</html>
