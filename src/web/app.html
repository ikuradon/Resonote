<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Resonote</title>
    <meta name="description" content="Comment on audio and video, synced to playback time" />
    <meta property="og:title" content="Resonote" />
    <meta property="og:description" content="Comment on audio and video, synced to playback time" />
    <meta property="og:url" content="https://resonote.pages.dev/" />
    <meta property="og:image" content="https://resonote.pages.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Resonote" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://resonote.pages.dev/og-image.png" />
    <meta name="theme-color" content="#c9a256" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="margin: 0; background: #06060a">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      const observer = new MutationObserver(() => {
        const el = document.getElementById('loading-indicator');
        if (el) {
          el.style.opacity = '0';
          setTimeout(() => el.remove(), 300);
        }
        observer.disconnect();
      });
      const target = document.querySelector('[style="display: contents"]');
      if (target) observer.observe(target, { childList: true });
    </script>
    <div
      id="loading-indicator"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        min-height: 100vh;
        background: #06060a;
        color: #c9a256;
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        letter-spacing: 0.05em;
        transition: opacity 0.3s ease;
      "
    >
      <svg
        width="48"
        height="48"
        viewBox="0 0 256 261"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <defs>
          <linearGradient
            id="splash-grad"
            x1="129.5"
            x2="129.5"
            y1="257.2"
            y2="3.8"
            gradientUnits="userSpaceOnUse"
          >
            <stop offset="0" stop-color="#fee989" />
            <stop offset="1" stop-color="#d2ad56" />
          </linearGradient>
        </defs>
        <path
          d="M232.1 127.8c-3.2 0-4.5.8-5.6 3.5-2.3 9.9-12.6 16.5-17.1 3.5l-4.2-12.1c-4.5 8.2-8.8 24.9-21.8 20 7.4-6.3 10.5-17.9 13.5-31.6 1.2-4.2 3.8-6.4 7.2-6.4 6.9-.5 10 16.9 12.8 21.7 4.4-13 20.5-8 31.1-8.9C245.4 54.2 193.3 3.8 129.5 3.8S13.2 54.5 10.9 118h21.3c6 0 8.8 1.4 11 5.8l9.3-28.9c1.9-7.5 11-5.5 11.9 1.2l11.4 47.4 13.3-77.1c1.3-7.7 11.9-6.5 12.4 1.1l11.6 53.7 6-18.6c1-2.7 3-4 5.9-3.8 3.1.2 4.5 2.8 5.7 6.1l6.2 13h2.5V55.2c-.2-4.3 8.6-2.5 9.2.2 4.4 9.6 11.5 17.8 20.3 24.9 21.5 16.9 18.3 45.2 2.1 62.7l-1.4-.6c11.8-17.9 3.3-45-18.9-46.4v75.7c2 26.1-47.6 36.2-48.7 9.2 0-12.6 15.8-24.7 36.7-23.9v-30.5c-8.9.1-9.2 1.1-12.8-9.4-2.6 4.2-6.7 27-13.3 26.3-3.9 0-5.7-2.2-6.7-6.7l-10-43-13.2 70.1c-1.5 8.6-11 7.1-12.3-.9l-13.3-49.2-7.6 22.6c-6.7 10.1-12.7.9-15.4-6.9-.9-4.7-18.9-2-23.3-2.6 1.2 30.7 14 58.4 34.2 78.8.6 1.1 0 2.3-.6 4.1l-14.1 41.5c-1.3 4 1.2 6.9 5.6 5.4l55.8-21.4c.3-.2.6-.2.9-.2 11.6 3.8 23.9 5.8 36.8 5.8 63.7 0 115.7-50.2 118.5-113.3H232Z"
          fill="url(#splash-grad)"
          fill-rule="evenodd"
        />
      </svg>
      <span style="font-weight: 600">Resonote</span>
      <div style="display: flex; align-items: center; gap: 3px; height: 20px">
        <span
          style="
            width: 3px;
            height: 100%;
            border-radius: 2px;
            background: #c9a256;
            animation: splash-wave 1.2s ease-in-out infinite;
            animation-delay: 0s;
          "
        ></span>
        <span
          style="
            width: 3px;
            height: 100%;
            border-radius: 2px;
            background: #c9a256;
            animation: splash-wave 1.2s ease-in-out infinite;
            animation-delay: 0.15s;
          "
        ></span>
        <span
          style="
            width: 3px;
            height: 100%;
            border-radius: 2px;
            background: #c9a256;
            animation: splash-wave 1.2s ease-in-out infinite;
            animation-delay: 0.3s;
          "
        ></span>
        <span
          style="
            width: 3px;
            height: 100%;
            border-radius: 2px;
            background: #c9a256;
            animation: splash-wave 1.2s ease-in-out infinite;
            animation-delay: 0.45s;
          "
        ></span>
        <span
          style="
            width: 3px;
            height: 100%;
            border-radius: 2px;
            background: #c9a256;
            animation: splash-wave 1.2s ease-in-out infinite;
            animation-delay: 0.6s;
          "
        ></span>
      </div>
    </div>
    <style>
      @keyframes splash-wave {
        0%,
        100% {
          transform: scaleY(0.1);
        }
        50% {
          transform: scaleY(1);
        }
      }
    </style>
  </body>
</html>
