<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Resonote</title>
    <meta name="description" content="Comment on audio and video, synced to playback time" />
    <meta property="og:title" content="Resonote" />
    <meta property="og:description" content="Comment on audio and video, synced to playback time" />
    <meta property="og:url" content="https://resonote.app/" />
    <meta property="og:image" content="https://resonote.app/og-image.png" />
    <meta property="og:site_name" content="Resonote" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://resonote.app/og-image.png" />
    <meta name="theme-color" content="#c9a256" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="margin: 0; background: #06060a">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      const observer = new MutationObserver(() => {
        const el = document.getElementById('loading-indicator');
        if (el) {
          el.style.opacity = '0';
          setTimeout(() => el.remove(), 300);
        }
        observer.disconnect();
      });
      const target = document.querySelector('[style="display: contents"]');
      if (target) observer.observe(target, { childList: true });
    </script>
    <div
      id="loading-indicator"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        min-height: 100vh;
        background: #06060a;
        color: #c9a256;
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        letter-spacing: 0.05em;
        transition: opacity 0.3s ease;
      "
    >
      <svg
        width="40"
        height="40"
        viewBox="0 0 64 64"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <defs>
          <mask id="splash-cutout">
            <rect width="64" height="64" fill="white" />
            <ellipse cx="27" cy="31" rx="8.5" ry="6" transform="rotate(-20 27 31)" fill="black" />
            <rect x="34" y="11" width="3.5" height="21" rx="1.75" fill="black" />
            <path
              d="M35.75 11.5C39 11 47.5 13.5 47.5 22"
              stroke="black"
              stroke-width="3.5"
              fill="none"
              stroke-linecap="round"
            />
          </mask>
        </defs>
        <path
          d="M14 4h36c5.5 0 10 4.5 10 10v20c0 5.5-4.5 10-10 10H22L8 56l6-12c-5.5 0-10-4.5-10-10V14C4 8.5 8.5 4 14 4z"
          fill="#c9a256"
          mask="url(#splash-cutout)"
        />
      </svg>
      <span style="font-weight: 600">Resonote</span>
      <span
        style="
          display: block;
          width: 24px;
          height: 2px;
          background: #c9a256;
          animation: pulse 1.5s ease-in-out infinite;
        "
      ></span>
    </div>
    <style>
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scaleX(1);
        }
        50% {
          opacity: 1;
          transform: scaleX(2);
        }
      }
    </style>
  </body>
</html>
